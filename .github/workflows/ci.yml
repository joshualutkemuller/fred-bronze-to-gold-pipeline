name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  unit:
    name: unit tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: pip install -e .
      - name: Run unit tests
        run: pytest -q

  spark-integration:
    name: Spark + Delta integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install PySpark + Delta
        run: |
          pip install -r requirements-dev.txt
          pip install "pyspark==3.5.3" "delta-spark==3.2.0"
          pip install -e .
      - name: Run Spark/Delta integration tests
        run: pytest -q tests/test_spark_integration.py
