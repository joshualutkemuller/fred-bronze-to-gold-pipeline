name: regional_fed_indicators
description: >
  Item 1 of docs/handoffs/series_discovery.md — flagship regional Federal
  Reserve indicators (FRED category 3008 "U.S. Regional Data" > 32071
  "Federal Reserve Districts"). Live discovery found that FRED's
  Federal-Reserve-Districts category itself mostly carries district-level
  H.4.1 balance-sheet/population data, not the well-known regional surveys —
  those had to be located by name via FRED's search API instead. Verified
  live against FRED (2026-07-19): all 5 ids below resolve, titles/units/
  frequency match what FRED reports.

  Cross-manifest dedup note: the initial discovery pass turned up 10
  candidates, but 5 were already ingested elsewhere and dropped here —
  CFNAI/NFCI (manifests/production_housing.yml), PCETRIM12M159SFRBDAL
  (manifests/prices_extra.yml), GDPNOW (manifests/macro_flags.yml), STLFSI4
  (manifests/money_banking.yml). This pipeline's regional-Fed-index coverage
  was already better than docs/handoffs/series_discovery.md assumed; the
  5 below are the actual net-new gap.

  Coverage note: of the 12 Fed districts, only Boston, Minneapolis,
  Richmond, and San Francisco have no distinctive, independently-popular
  flagship indicator discoverable on FRED (checked "Fifth District Survey"/
  "Richmond Fed Survey", "Tenth District Manufacturing Survey"/"Kansas City
  [Fed] Manufacturing", "San Francisco Fed Cyclical Core PCE"/"News
  Sentiment" — Richmond and Minneapolis returned nothing relevant; San
  Francisco's one candidate, "San Francisco Tech Pulse", is DISCONTINUED on
  FRED). Not every district publishing a flagship product elsewhere means
  it's on FRED.
version: 1

