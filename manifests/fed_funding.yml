name: fed_funding
description: >
  The Fed funding corridor for the funding tape (gold.funding_tape_daily /
  gold.funding_stress_daily, docs/market_terminal_gold_views.md §4.6): EFFR,
  IORB, OBFR, and the repo reference rates (TGCR/RRP), plus the overnight
  reverse-repo facility balance and 30-day average SOFR. SOFR itself and the
  balance-sheet lines (WALCL, WRESBAL, WTREGEN) are already ingested by other
  manifests and are deliberately NOT repeated here (one manifest per series).

  Verified against live FRED (2026-07-17): all ids below resolve except the
  original "BGCR" (Broad General Collateral Rate), which does not exist under
  that id or any variant tried (BGCRRATE, search by title) — omitted rather
  than shipping a guessed id. "TGCR" was corrected to "TGCRRATE" (the real id;
  the bare "TGCR" 400s). Note IORB begins 2021-07 (it replaced IOER/IORR);
  TGCRRATE begins 2018.
version: 1

series:
  - series_id: EFFR
    title: Effective Federal Funds Rate (daily)
    category: rates
    frequency: d
    units: Percent
    active: true
    vintage_enabled: false   # published market rate, not revised
    validation_profile: standard
    downstream_use_case: funding_tape
    priority: 1
    min_value: -1
    max_value: 25
    tags: [rates, funding, corridor, policy]

  - series_id: IORB
