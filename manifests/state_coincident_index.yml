name: state_coincident_index
description: >
  Item 1 of docs/handoffs/series_discovery.md — Philadelphia Fed state
  coincident economic activity indexes (FRED release 109 'State Coincident
  Indexes'). 50 series, one per state (Philly Fed's coincident-index
  methodology does not cover DC or territories). Verified live against FRED
  (2026-07-19). Excluded USPHCI (the national aggregate, not a state).
version: 1

series:
  - series_id: AKPHCI
    title: "Coincident Economic Activity Index for Alaska"
    category: state_activity
    frequency: m
    units: "Index 2007=100"
    active: true
    vintage_enabled: false
    validation_profile: standard
    downstream_use_case: state_panel
    priority: 5
    tags: [regional, state, coincident_index]

