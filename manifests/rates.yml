name: rates
description: >
  US Treasury constant-maturity yields and key policy/overnight rates. These
  drive yield-curve construction, discounting, and optimizer inputs.
  NOTE: these are observed market prices/rates that FRED does not revise, so
  vintage_enabled is false. (Requesting full ALFRED vintage history for daily
  series also exceeds FRED's 2000-vintage-dates-per-request cap.)
version: 1

series:
  - series_id: DGS1MO
    title: 1-Month Treasury Constant Maturity Rate
    category: rates
    frequency: d
    units: Percent
    load_type: incremental
    expected_update_frequency: business_daily
    vintage_enabled: false   # market rate, not revised
    validation_profile: standard
    business_owner: quant-macro
    technical_owner: data-eng
    downstream_use_case: yield_curve
    priority: 1
    min_value: -5      # sanity bounds: nominal yields shouldn't leave this range
    max_value: 25
    tags: [rates, curve, treasury]

  - series_id: DGS3MO
    title: 3-Month Treasury Constant Maturity Rate
    category: rates
    frequency: d
    units: Percent
    vintage_enabled: false
    downstream_use_case: yield_curve
    priority: 1
    tags: [rates, curve, treasury]

