name: census_indicators
description: >
  Demonstration manifest for the US Census Bureau economic time-series API
  (source: census), flowing through the same Bronze → Silver → Gold path.
  Key optional (keyless works at a lower quota). series_id encodes
  '<dataset_path>:<predicate=value,...>'. Shipped inactive (active: true).
  NOTE: verify the predicate codes against the live API before enabling.
version: 1

series:
  - series_id: "timeseries/eits/marts:category_code=44X72,data_type_code=SM,seasonally_adj=yes"
    title: Advance Retail Sales - Retail & Food Services (SA)
    category: growth
    frequency: m
    units: Millions of Dollars
    active: true
    source: census
    load_type: incremental
    expected_update_frequency: monthly
    vintage_enabled: false
    validation_profile: standard
    downstream_use_case: consumption_nowcast
    priority: 3
    min_value: 0
    tags: [growth, retail, census]
