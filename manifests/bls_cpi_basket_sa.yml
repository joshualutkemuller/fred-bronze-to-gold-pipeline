name: bls_cpi_basket_sa
description: >
  Seasonally-adjusted (SA) companion to bls_cpi_basket.yml. Same CPI-U item
  hierarchy but series id CUSR0000<item> (the 'S' = Seasonally Adjusted). SA is
  what most headline inflation analysis uses (month-over-month rates), but BLS
  publishes SA only for the aggregates and items with an identifiable seasonal
  pattern — NOT the full stratum set (that's why bls_cpi_basket.yml, NSA, is the
  complete basket). This file covers the SA-published aggregates, the 8 major
  groups, and the common SA sub-items. Shipped inactive (active: true).

  ⚠️ VERIFY BEFORE ACTIVATING: SA availability is narrower than NSA and these ids
  were assembled from the documented CPI structure, not checked live here. Some
  detailed strata may be NSA-only — a missing SA id fails only that one series
  (per-series isolation), so verify at https://data.bls.gov/toppicks?survey=cr
  and prune any that BLS doesn't publish seasonally adjusted.
version: 1

series:
  # --- headline & special aggregates (SA) ---
  - {series_id: CUSR0000SA0,    title: CPI-U All Items (SA),                          category: inflation, frequency: m, source: bls, active: true, vintage_enabled: false, validation_profile: standard, priority: 1, min_value: 0, tags: [cpi, headline, sa, bls]}
  - {series_id: CUSR0000SA0L1E, title: CPI-U All Items Less Food and Energy / Core (SA), category: inflation, frequency: m, source: bls, active: true, vintage_enabled: false, validation_profile: standard, priority: 1, min_value: 0, tags: [cpi, core, sa, bls]}
  - {series_id: CUSR0000SA0E,   title: CPI-U Energy (SA),                             category: inflation, frequency: m, source: bls, active: true, vintage_enabled: false, validation_profile: standard, priority: 2, min_value: 0, tags: [cpi, energy, sa, bls]}
  - {series_id: CUSR0000SAC,    title: CPI-U Commodities (SA),                         category: inflation, frequency: m, source: bls, active: true, vintage_enabled: false, validation_profile: standard, priority: 2, min_value: 0, tags: [cpi, commodities, sa, bls]}
  - {series_id: CUSR0000SAS,    title: CPI-U Services (SA),                            category: inflation, frequency: m, source: bls, active: true, vintage_enabled: false, validation_profile: standard, priority: 2, min_value: 0, tags: [cpi, services, sa, bls]}
