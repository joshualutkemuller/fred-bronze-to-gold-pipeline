name: bea_pce_items
description: >
  BEA NIPA Table 2.4.4 — "Price Indexes for Personal Consumption Expenditures
  by Type of Product" (monthly, SA). Provides item-level PCE price indexes for
  the Inflation Explorer (gold.inflation_explorer / gold.inflation_contribution).
  Uses the BEA API source (source: bea); series_id format is
  '<dataset>:<table>:<line>:<frequency>' e.g. 'NIPA:T20404:1:M'.

  All table lines share the same API call to BEA GetData (BEAClient fetches the
  full table; normalize_bea_observations selects the correct LineNumber), so the
  16 series below cost only one network round-trip per scheduled ingest run.

  Shipped inactive (active: true). To enable:
    1. Obtain a free BEA API key from https://apps.bea.gov/API/signup/
    2. Set the BEA_API_KEY environment variable (or equivalent secret).
    3. Verify line numbers against the live BEA table:
       https://apps.bea.gov/iTable/?reqid=19&step=4&isuri=1&nipa_table_list=71
       (Table 2.4.4) — line numbers can shift when BEA revises the table structure.
    4. Set active: true on the series you wish to ingest.

  ⚠️  Line numbers below are from BEA Table 2.4.4 documentation and should be
  verified before activation. Line 1 (PCE headline) is PCEPI on FRED and is
  already ingested via manifests/inflation.yml — skip it here.
version: 1

series:
  # --- major spending aggregates ---
  - series_id: "NIPA:T20404:2:M"
    title: PCE Price Index - Goods (SA)
    category: inflation
    frequency: m
    units: Index 2017=100
    active: true
    source: bea
    load_type: incremental
    expected_update_frequency: monthly
    vintage_enabled: false
    validation_profile: standard
    downstream_use_case: inflation_explorer
    priority: 2
    min_value: 0
    tags: [pce, goods, bea, inflation]

