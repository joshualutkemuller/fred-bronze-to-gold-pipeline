name: macro_flags
description: >
  Regime/overlay flag series for the market-terminal analytical views
  (docs/market_terminal_gold_views.md): the NBER recession indicator drives
  the is_recession column in gold.dim_date, gold.treasury_curve_metrics, and
  gold.curve_spread_daily (recession shading in Power BI). Until USREC is
  ingested those columns are NULL (unknown), never false.

  ⚠️ VERIFY BEFORE ACTIVATING: standard FRED ids, but assembled without live
  FRED access from this environment — confirm at https://fred.stlouisfed.org
  before flipping active: true. A wrong id fails only that one series
  (per-series isolation), not the run.
version: 1

series:
  - series_id: USREC
    title: NBER Recession Indicator (monthly, 1 = recession)
    category: growth
    frequency: m
    units: +1 or 0
    active: false
    vintage_enabled: false   # NBER dating changes only at turning points
    validation_profile: standard
    downstream_use_case: recession_overlay
    priority: 2
    min_value: 0
    max_value: 1
    tags: [regime, recession, nber]

  - series_id: USRECD
    title: NBER Recession Indicator (daily, 1 = recession)
    category: growth
    frequency: d
    units: +1 or 0
    active: false
    vintage_enabled: false
    validation_profile: standard
    downstream_use_case: recession_overlay
    priority: 3
    min_value: 0
    max_value: 1
    tags: [regime, recession, nber]
