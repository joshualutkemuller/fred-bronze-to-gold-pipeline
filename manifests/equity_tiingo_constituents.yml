# Generated from fred_local.db gold_index_constituents latest IVV snapshot.
# Inactive by default: use a temporary batch manifest or flip selected names active.
# Excluded: exact existing manifest ids plus symbols containing digits, e.g. ESU6.
name: equity_tiingo_constituents
description: Inactive-by-default Tiingo pricing universe generated from the latest gold_index_constituents IVV snapshot. Excludes
  exact series IDs already defined by existing manifests and obvious non-equity/futures-like symbols containing digits (for
  example ESU6). Activate or batch-run deliberately because Tiingo free-tier hourly/monthly quotas are lower than this full
  universe.
