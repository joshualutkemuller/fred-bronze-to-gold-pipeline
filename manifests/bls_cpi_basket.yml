name: bls_cpi_basket
description: >
  The CPI-U item hierarchy from the BLS Public Data API (source: bls) — headline
  and special aggregates, the 8 major groups, and selected sub-strata — so the
  whole consumer basket can be ingested rather than the partial set FRED mirrors.
  Series are CPI-U, NOT seasonally adjusted, U.S. city average (CUUR0000<item>);
  NSA is published for every stratum, whereas SA (CUSR0000<item>) exists only for
  the major aggregates. Shipped inactive (active: false); keyless works at a
  lower quota.

  ⚠️ VERIFY BEFORE ACTIVATING: these BLS item codes were assembled from the
  documented CPI item structure but not checked against the live BLS series
  directory from the build environment. Confirm each id at
  https://data.bls.gov/toppicks?survey=cr (or the series-ID lookup) — a wrong id
  fails only that one series (per-series isolation), not the run. Index base
  periods differ by item; 'units' below is informational.
version: 1

series:
  # --- headline & special aggregates ---
  - {series_id: CUUR0000SA0,    title: CPI-U All Items,                              category: inflation, frequency: m, source: bls, active: false, vintage_enabled: false, validation_profile: standard, priority: 1, min_value: 0, tags: [cpi, headline, bls]}
  - {series_id: CUUR0000SA0L1E, title: CPI-U All Items Less Food and Energy (Core),  category: inflation, frequency: m, source: bls, active: false, vintage_enabled: false, validation_profile: standard, priority: 1, min_value: 0, tags: [cpi, core, bls]}
  - {series_id: CUUR0000SA0E,   title: CPI-U Energy,                                 category: inflation, frequency: m, source: bls, active: false, vintage_enabled: false, validation_profile: standard, priority: 2, min_value: 0, tags: [cpi, energy, bls]}
