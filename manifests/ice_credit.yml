name: ice_credit
description: >
  ICE BofA option-adjusted spread (OAS) indices for the credit-spreads Gold
  table (gold.credit_spread_daily, docs/market_terminal_gold_views.md §4.7):
  IG and HY headline OAS plus the rating curves (AAA→BBB, BB→CCC). Values are
  percent (the Gold layer also emits ×100 bps). Daily, published by ICE via
  FRED; not revised.

  ⚠️ VERIFY BEFORE ACTIVATING: standard FRED ids for these indices, but
  assembled without live FRED access from this environment — confirm each at
  https://fred.stlouisfed.org before flipping active: true. A wrong id fails
  only that one series (per-series isolation), not the run.
version: 1

series:
  # --- headline ---
  - {series_id: BAMLC0A0CM,   title: ICE BofA US Corporate Index OAS (IG),      category: rates, frequency: d, units: Percent, active: false, vintage_enabled: false, validation_profile: standard, downstream_use_case: credit_spreads, priority: 1, min_value: 0, max_value: 30, tags: [credit, oas, ig]}
  - {series_id: BAMLH0A0HYM2, title: ICE BofA US High Yield Index OAS,          category: rates, frequency: d, units: Percent, active: false, vintage_enabled: false, validation_profile: standard, downstream_use_case: credit_spreads, priority: 1, min_value: 0, max_value: 30, tags: [credit, oas, hy]}
