name: equity_stooq
description: >
  Equity price manifest (source: stooq) — broad ETFs plus large-cap
  constituents, daily split-adjusted close for price return, expanded for
  market_terminal parity (docs/market_terminal_series_gap.md §2, 89 tickers).
  Keyless. series_id is '<ticker>:<field>' (field default close;
  open/high/low/volume also supported); the client appends Stooq's '.us'
  market suffix.

  For the full S&P 500 constituent universe, generate a manifest from an ETF
  holdings CSV with fred_pipeline.sources.ishares.build_equity_manifest rather
  than hand-listing 500 tickers.

  BBBY (Bed Bath & Beyond) was delisted in 2023 — included for
  market_terminal parity, but expect it to fail (isolated, per-series) if
  Stooq no longer serves it.

  ⚠️ OPTIONAL / INACTIVE BY DEFAULT: Stooq changed CSV downloads in 2026 to
  require an apikey parameter. Gold equity return now falls back to the keyed
  Tiingo feed, so this manifest is kept inactive for vendor reconciliation or
  debugging. To use it, generate a key from a historical-data page such as
  https://stooq.com/q/d/?s=spy.us&get_apikey, set STOOQ_API_KEY (or
  stooq_api_key in config/config.yaml), then reactivate selected series.

  ⚠️ Tickers not independently re-verified against a live Stooq call from this
  environment (Stooq has no metadata-lookup endpoint to check against, unlike
  FRED) — a wrong/unlisted symbol returns an empty body and fails only its own
  series (per-series isolation), not the run.
version: 1

series:
  # --- broad / sector ETFs ---
  - {series_id: "SPY:close", title: SPDR S&P 500 ETF,           category: equity, frequency: d, units: USD, active: false, source: stooq, vintage_enabled: false, validation_profile: standard, downstream_use_case: equity_price_return, priority: 1, min_value: 0, tags: [equity, etf, close, stooq]}
