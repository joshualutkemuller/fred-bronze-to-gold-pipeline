name: equity_tiingo
description: >
  Equity total-return manifest (source: tiingo) — broad ETFs + large-cap
  constituents, expanded for market_terminal parity
  (docs/market_terminal_series_gap.md §2, 85 tickers). Tiingo needs a free
  account key (set TIINGO_API_KEY / tiingo_api_key — not yet set in this
  environment's config.yaml as of 2026-07-17; every series here will fail
  isolated per-series until it is). series_id is the BARE TICKER (e.g. AAPL):
  one fetch explodes into <ticker>:close/divCash/splitFactor/adjClose Silver
  series, from which gold.equity_total_return_index reconstructs true total
  return.

  Quota note: 85 unique symbols is well within the free tier's ~500/month
  unique-symbol cap and ~1,000/day request cap.

  BBBY (Bed Bath & Beyond) was delisted in 2023 — included for
  market_terminal parity, but expect it to fail (isolated, per-series) unless
  Tiingo still serves historical-only data for it.
version: 1

series:
