name: equity_tiingo
description: >
  Equity total-return manifest (source: tiingo) — broad ETFs only. Originally
  85 tickers (58 ETFs + 27 large-cap stocks, expanded for market_terminal
  parity, docs/market_terminal_series_gap.md §2); the 27 individual stocks
  were removed by request (2026-07-20) — individual-name coverage now comes
  from the IVV constituent-pricing mechanism instead (constituent_pricing.py
  / `python -m fred_pipeline price-constituents`), which prices the real S&P
  500 membership rather than a hand-picked subset. series_id is the BARE
  TICKER (e.g. SPY): one fetch explodes into <ticker>:close/divCash/
  splitFactor/adjClose Silver series, from which
  gold.equity_total_return_index reconstructs true total return.

  27 gap-filling ETFs added back (2026-07-20, see
  docs/handoffs/etf_expansion.md): gold (GLD), broad EM/developed-ex-US
  (EEM/EFA/VXUS), mid-cap (MDY), the value/quality/min-vol/low-vol factors
  (VLUE/QUAL/USMV/SPLV) alongside the existing momentum (MTUM), dividend/
  income (VYM/SCHD/PFF), gold miners (GDX/GDXJ), defense/metals/retail
  sectors (ITA/XME/XRT), short-duration/high-yield-muni/floating-rate bonds
  (BSV/HYD/FLOT), and six more major-economy single-country funds (EWY/EWW/
  EWT/EWA/EWL/EWQ) rounding out the international book. Back to 85 unique
  symbols total.

  Quota note: 85 unique symbols is well within the free tier's ~500/month
  unique-symbol cap and ~1,000/day request cap.
version: 1

series:
