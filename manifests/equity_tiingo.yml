name: equity_tiingo
description: >
  Demo equity total-return manifest (source: tiingo) — broad ETFs + large-cap
  constituents. Tiingo needs a free account key (set TIINGO_API_KEY /
  tiingo_api_key); personal-use free tier. series_id is the BARE TICKER (e.g.
  AAPL): one fetch explodes into <ticker>:close/divCash/splitFactor/adjClose
  Silver series, from which gold.equity_total_return_index reconstructs true
  total return. Shipped inactive.

  Quota note: the free tier caps UNIQUE SYMBOLS per month (~500) and daily
  requests (~1,000) — one ticker = one request here, so keep the active set
  within budget (broad ETFs + a trimmed constituent list). Generate a fuller
  list from an ETF holdings CSV with sources.ishares.build_equity_manifest
  (pass source='tiingo', field is ignored for Tiingo — the ticker is bare).

  ⚠️ VERIFY BEFORE ACTIVATING: tickers listed from memory, not checked against
  Tiingo from this environment. A wrong symbol fails only its own series.
version: 1

