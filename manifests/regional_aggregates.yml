    title: "Unemployment Rate in Midwest Census Region"
    category: state_labor
    frequency: m
    units: "Percent"
    active: true
    vintage_enabled: false
    validation_profile: standard
    downstream_use_case: regional_panel
    priority: 5
    tags: [regional, census_ur]

