name: regional_aggregates
description: >
  Item 1 of docs/handoffs/series_discovery.md — Census/BEA/BLS regional
  aggregates (FRED categories 32043 'Census Regions', 32061 'BEA Regions',
  32849 'BLS Regions'; Freddie Mac Regions (32233) checked and skipped
  entirely — every series in all 5 sub-regions is DISCONTINUED on FRED). 28
  series: 4 Census-region unemployment rates + 4 populations, 8 BEA-region
  populations + 8 quarterly all-industry GDP levels, 4 BLS 'urban' regional
  CPI headlines. Housing-starts and median-home-price series for the 4 Census
  regions were also discovered but dropped — already ingested via
  manifests/production_housing.yml. Verified live against FRED (2026-07-19).
version: 1

series:
