name: bls_labor
description: >
  Demonstration manifest for the multi-source capability: these series are
  pulled from the BLS Public Data API (source: bls) rather than FRED, and flow
  through the same Bronze/Silver/Gold path. Shipped inactive (active: true) so
  default runs don't fetch them; set active: true to enable once a BLS
  registration key is configured (keyless also works at a lower quota).
version: 1

series:
  # CPI series moved to manifests/bls_cpi_basket.yml (the full item hierarchy).
  - series_id: LNS14000000
    title: Unemployment Rate (SA, BLS)
    category: labor
    frequency: m
    units: Percent
    active: true
    source: bls
    load_type: incremental
    expected_update_frequency: monthly
    vintage_enabled: false
    validation_profile: standard
    downstream_use_case: cross_source_validation
    priority: 2
    min_value: 0
    max_value: 100
    tags: [labor, unemployment, bls]
