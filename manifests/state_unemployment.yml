name: state_unemployment
description: >
  Item 1 of docs/handoffs/series_discovery.md — state-level unemployment rate
  panel (FRED release 112 'State Employment and Unemployment', regex-filtered
  to the clean <2-letter-state>UR id pattern). 52 series: 50 states + DC +
  Puerto Rico. Verified live against FRED (2026-07-19). Excluded DSUR
  ('Unemployment Rate in FRB-St. Louis District States') — matches the id
  pattern but is a Fed-district aggregate, not a state, and is DISCONTINUED on
  FRED.
version: 1

series:
  - series_id: AKUR
    title: "Unemployment Rate in Alaska"
    category: state_labor
    frequency: m
    units: "Percent"
    active: true
    vintage_enabled: false
    validation_profile: standard
    downstream_use_case: state_panel
    priority: 5
    tags: [regional, state, unemployment]

