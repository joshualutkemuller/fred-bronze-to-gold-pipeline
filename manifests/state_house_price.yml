name: state_house_price
description: >
  Item 1 of docs/handoffs/series_discovery.md — state-level All-Transactions
  House Price Index (FRED release 171 'House Price Index').
  manifests/production_housing.yml already carries 38 of the 51 state-level
  STHPI series; these are the 14 genuinely missing ones (AK, AR, DE, KS, LA,
  MS, ND, NE, NM, NV, OK, SD, WV, WY). Verified live against FRED
  (2026-07-19).
version: 1

series:
  - series_id: AKSTHPI
    title: "All-Transactions House Price Index for Alaska"
    category: state_housing
    frequency: q
    units: "Index 1980:Q1=100"
    active: true
    vintage_enabled: false
    validation_profile: standard
    downstream_use_case: state_panel
    priority: 5
    tags: [regional, state, house_price]

