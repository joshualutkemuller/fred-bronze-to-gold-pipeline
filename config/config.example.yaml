# FRED pipeline configuration template.
#
# Copy this file to `config/config.yaml` and fill in your values:
#   cp config/config.example.yaml config/config.yaml
#
# `config/config.yaml` is git-ignored so your API key is never committed.
# The file is entirely OPTIONAL — every value here has a built-in default, and
# any setting can also be provided via environment variable or CLI argument.
#
# Precedence (highest wins):
#   explicit CLI/arg  >  environment variable  >  this file  >  built-in default
# The API key additionally falls back to a Databricks secret scope on Databricks.
#
# Two layouts are supported. Simple flat layout:
#
#   fred_api_key: "your-32-char-key"
#   rate_limit_per_minute: 120
#
# ...or a `default:` block with per-environment overrides (shown below).

default:
  # --- Secret ---
  # Prefer leaving this blank and setting FRED_API_KEY (env) or a Databricks
  # secret scope. Only put a literal key here for quick local use.
  fred_api_key: ""

  # --- FRED API client ---
  fred_base_url: "https://api.stlouisfed.org/fred"
  request_timeout_seconds: 30
  max_retries: 5
  rate_limit_per_minute: 120
  # Concurrent extraction workers (thread pool; extraction is I/O-bound and
  # still rate-limited by rate_limit_per_minute above).
  extract_workers: 8

  # --- Additional data sources (see fred_pipeline.sources) ---
  # All optional: every source manifest (manifests/eia_energy.yml,
  # bea_national_accounts.yml, equity_tiingo.yml, etc.) ships with
  # `active: false`, so the pipeline runs fine on FRED alone until you flip a
  # manifest to active AND set the matching key below (or its env var).
  # EIA and BEA and Tiingo *require* a key (their client raises without one);
  # BLS and Census work keyless at a lower daily quota; SEC needs a
  # descriptive User-Agent (contact info), not a key, or it 403s; Treasury,
  # World Bank, and Stooq are fully keyless.
  bls_api_key: ""       # BLS_API_KEY    — optional, https://www.bls.gov/developers/api_signature_v2.htm
  eia_api_key: ""       # EIA_API_KEY    — required if any eia_* manifest is active, https://www.eia.gov/opendata/register.php
  bea_api_key: ""       # BEA_API_KEY    — required if any bea_* manifest is active (UserID), https://apps.bea.gov/API/signup/
  census_api_key: ""    # CENSUS_API_KEY — optional, https://api.census.gov/data/key_signup.html
  tiingo_api_key: ""    # TIINGO_API_KEY — required if equity_tiingo.yml is active, https://www.tiingo.com/account/api/token
  sec_user_agent: ""    # SEC_USER_AGENT — required if any sec_* manifest is active; e.g. "Your Name your@email.com"

  # --- Incremental load ---
  # A series with no data yet is always loaded in full. On later runs, only the
  # most recent N observations are re-pulled ("restated") so revisions are
  # captured. Override per series in a manifest with `restate_records:` (tune
  # higher for deeply-revised series like GDP/payrolls). Force a full re-pull
  # for a series with `load_type: full`.
  restate_last_n: 90

  # --- Databricks secret scope (used when fred_api_key is empty on Databricks) ---
  secret_scope: "fred"
  secret_key: "api_key"

  # --- Bronze raw-payload archive volume (blank = derived from catalog) ---
  raw_volume_path: ""

  # --- Notifications (handoff "Notify" step) ---
  # POST a run summary to a Slack-compatible webhook. Leave blank to only log.
  # notify_on: never | failure (default) | always
  alert_webhook_url: ""
  notify_on: "failure"

  # --- Vintage history ---
  # false (default): one full-window request per vintage series; if it exceeds
  #   FRED's 2000-vintage-date cap the client falls back to a bounded window.
  # true: fetch COMPLETE vintage history by batching under the cap (more API
  #   calls; use for series where full point-in-time history is required).
  complete_vintage_history: false

# Per-environment overrides are merged on top of `default` for the chosen --env.
environments:
  dev: {}
  test: {}
  prod:
    # e.g. be gentler on the API in prod batch windows:
    rate_limit_per_minute: 120
