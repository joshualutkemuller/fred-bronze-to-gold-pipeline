# Inflation Explorer item trees (gold.inflation_explorer /
# gold.inflation_contribution, terminal module INFL). See
# src/fred_pipeline/inflation_config.py for field semantics.
#
# Three trees, keyed (basket, sa_nsa):
#   CPI/SA  — rooted at CPIAUCSL (FRED's SA CPI-U mirror, ALREADY ACTIVE, so
#             headline/core rows appear with zero activation); item drill-down
#             comes from the CUSR* SA basket (manifests/bls_cpi_basket_sa.yml,
#             shipped inactive — verify + activate to fill the tree).
#   CPI/NSA — rooted at CUUR0000SA0 with the full NSA stratum set
#             (manifests/bls_cpi_basket.yml, shipped inactive).
#   PCE/SA  — headline + core only until BEA item-level ingestion lands
#             (PCEPI/PCEPILFE are already active).
#
# weight = BLS CPI-U relative importance in percent of the headline basket.
# ⚠️ The weights below are APPROXIMATE (Dec-2023-era relative importance,
# recalled, not fetched — this build environment cannot reach BLS). They make
# the contribution waterfall structurally correct; refresh them from the BLS
# relative-importance table before treating contributions as precise.
# waterfall: true marks the additive decomposition set (the 8 major groups)
# stacked against the headline print.

items:
  # ============================ CPI / SA tree ================================
  - {series_id: CPIAUCSL, label: All Items,                      basket: CPI, sa_nsa: SA, level: 0}
  - {series_id: CPILFESL, label: Core (All Items Less Food and Energy), basket: CPI, sa_nsa: SA, parent: CPIAUCSL, level: 1}
  - {series_id: CUSR0000SA0E,   label: Energy,                   basket: CPI, sa_nsa: SA, parent: CPIAUCSL, level: 1}
  - {series_id: CUSR0000SAC,    label: Commodities,              basket: CPI, sa_nsa: SA, parent: CPIAUCSL, level: 1}
  - {series_id: CUSR0000SAS,    label: Services,                 basket: CPI, sa_nsa: SA, parent: CPIAUCSL, level: 1}
  - {series_id: CUSR0000SACL1E, label: Core Goods,               basket: CPI, sa_nsa: SA, parent: CUSR0000SAC, level: 2}
  - {series_id: CUSR0000SASLE,  label: Core Services,            basket: CPI, sa_nsa: SA, parent: CUSR0000SAS, level: 2}
  # --- the 8 major groups (the waterfall decomposition) ---
  - {series_id: CUSR0000SAF, label: Food and Beverages,          basket: CPI, sa_nsa: SA, parent: CPIAUCSL, level: 1, weight: 14.4, waterfall: true}
  - {series_id: CUSR0000SAH, label: Housing,                     basket: CPI, sa_nsa: SA, parent: CPIAUCSL, level: 1, weight: 44.4, waterfall: true}
  - {series_id: CUSR0000SAA, label: Apparel,                     basket: CPI, sa_nsa: SA, parent: CPIAUCSL, level: 1, weight: 2.5,  waterfall: true}
  - {series_id: CUSR0000SAT, label: Transportation,              basket: CPI, sa_nsa: SA, parent: CPIAUCSL, level: 1, weight: 16.7, waterfall: true}
  - {series_id: CUSR0000SAM, label: Medical Care,                basket: CPI, sa_nsa: SA, parent: CPIAUCSL, level: 1, weight: 8.0,  waterfall: true}
  - {series_id: CUSR0000SAR, label: Recreation,                  basket: CPI, sa_nsa: SA, parent: CPIAUCSL, level: 1, weight: 5.4,  waterfall: true}
  - {series_id: CUSR0000SAE, label: Education and Communication, basket: CPI, sa_nsa: SA, parent: CPIAUCSL, level: 1, weight: 5.8,  waterfall: true}
  - {series_id: CUSR0000SAG, label: Other Goods and Services,    basket: CPI, sa_nsa: SA, parent: CPIAUCSL, level: 1, weight: 2.7,  waterfall: true}
  # --- selected SA sub-strata ---
  - {series_id: CUSR0000SAF1,   label: Food,                     basket: CPI, sa_nsa: SA, parent: CUSR0000SAF, level: 2}
