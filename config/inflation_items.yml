  - {series_id: "NIPA:T20404:17:M", label: Transportation Services,                    basket: PCE, sa_nsa: SA, parent: "NIPA:T20404:14:M", level: 3, weight: 3.0,  waterfall: true}
  - {series_id: "NIPA:T20404:18:M", label: Recreation Services,                        basket: PCE, sa_nsa: SA, parent: "NIPA:T20404:14:M", level: 3, weight: 4.0,  waterfall: true}
  - {series_id: "NIPA:T20404:19:M", label: Food Services and Accommodations,           basket: PCE, sa_nsa: SA, parent: "NIPA:T20404:14:M", level: 3, weight: 6.5,  waterfall: true}
  - {series_id: "NIPA:T20404:20:M", label: Financial Services and Insurance,           basket: PCE, sa_nsa: SA, parent: "NIPA:T20404:14:M", level: 3, weight: 7.5,  waterfall: true}
  - {series_id: "NIPA:T20404:21:M", label: Other Services,                             basket: PCE, sa_nsa: SA, parent: "NIPA:T20404:14:M", level: 3, weight: 8.5,  waterfall: true}

  # --- nonprofits (level 2 under Services) ---
  - {series_id: "NIPA:T20404:22:M", label: Final Consumption Expenditures of NPISHs,  basket: PCE, sa_nsa: SA, parent: "NIPA:T20404:13:M", level: 2, weight: 3.5,  waterfall: true}
