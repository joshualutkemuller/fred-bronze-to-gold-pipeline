  - {series_id: CUUR0000SAH2,   label: Fuels and Utilities,      basket: CPI, sa_nsa: NSA, parent: CUUR0000SAH, level: 2}
  - {series_id: CUUR0000SEHF01, label: Electricity,              basket: CPI, sa_nsa: NSA, parent: CUUR0000SAH2, level: 3}
  - {series_id: CUUR0000SEHF02, label: Utility (Piped) Gas,      basket: CPI, sa_nsa: NSA, parent: CUUR0000SAH2, level: 3}
  - {series_id: CUUR0000SETA01, label: New Vehicles,             basket: CPI, sa_nsa: NSA, parent: CUUR0000SAT, level: 2}
  - {series_id: CUUR0000SETA02, label: Used Cars and Trucks,     basket: CPI, sa_nsa: NSA, parent: CUUR0000SAT, level: 2}
  - {series_id: CUUR0000SETB01, label: Gasoline (All Types),     basket: CPI, sa_nsa: NSA, parent: CUUR0000SAT, level: 2}
  - {series_id: CUUR0000SAM1,   label: Medical Care Commodities, basket: CPI, sa_nsa: NSA, parent: CUUR0000SAM, level: 2}
