  - {series_id: CUUR0000SAC,    label: Commodities,              basket: CPI, sa_nsa: NSA, parent: CUUR0000SA0, level: 1}
  - {series_id: CUUR0000SAS,    label: Services,                 basket: CPI, sa_nsa: NSA, parent: CUUR0000SA0, level: 1}
  - {series_id: CUUR0000SACL1E, label: Core Goods,               basket: CPI, sa_nsa: NSA, parent: CUUR0000SAC, level: 2}
  - {series_id: CUUR0000SASLE,  label: Core Services,            basket: CPI, sa_nsa: NSA, parent: CUUR0000SAS, level: 2}
  - {series_id: CUUR0000SAF, label: Food and Beverages,          basket: CPI, sa_nsa: NSA, parent: CUUR0000SA0, level: 1, weight: 14.4, waterfall: true}
  - {series_id: CUUR0000SAH, label: Housing,                     basket: CPI, sa_nsa: NSA, parent: CUUR0000SA0, level: 1, weight: 44.4, waterfall: true}
  - {series_id: CUUR0000SAA, label: Apparel,                     basket: CPI, sa_nsa: NSA, parent: CUUR0000SA0, level: 1, weight: 2.5,  waterfall: true}
  - {series_id: CUUR0000SAT, label: Transportation,              basket: CPI, sa_nsa: NSA, parent: CUUR0000SA0, level: 1, weight: 16.7, waterfall: true}
  - {series_id: CUUR0000SAM, label: Medical Care,                basket: CPI, sa_nsa: NSA, parent: CUUR0000SA0, level: 1, weight: 8.0,  waterfall: true}
  - {series_id: CUUR0000SAR, label: Recreation,                  basket: CPI, sa_nsa: NSA, parent: CUUR0000SA0, level: 1, weight: 5.4,  waterfall: true}
  - {series_id: CUUR0000SAE, label: Education and Communication, basket: CPI, sa_nsa: NSA, parent: CUUR0000SA0, level: 1, weight: 5.8,  waterfall: true}
  - {series_id: CUUR0000SAG, label: Other Goods and Services,    basket: CPI, sa_nsa: NSA, parent: CUUR0000SA0, level: 1, weight: 2.7,  waterfall: true}
  - {series_id: CUUR0000SAF1,   label: Food,                     basket: CPI, sa_nsa: NSA, parent: CUUR0000SAF, level: 2}
  - {series_id: CUUR0000SAF11,  label: Food at Home,             basket: CPI, sa_nsa: NSA, parent: CUUR0000SAF1, level: 3}
  - {series_id: CUUR0000SEFV,   label: Food Away from Home,      basket: CPI, sa_nsa: NSA, parent: CUUR0000SAF1, level: 3}
  - {series_id: CUUR0000SAF116, label: Alcoholic Beverages,      basket: CPI, sa_nsa: NSA, parent: CUUR0000SAF, level: 2}
  - {series_id: CUUR0000SAH1,   label: Shelter,                  basket: CPI, sa_nsa: NSA, parent: CUUR0000SAH, level: 2, weight: 36.2}
  - {series_id: CUUR0000SEHA,   label: Rent of Primary Residence, basket: CPI, sa_nsa: NSA, parent: CUUR0000SAH1, level: 3}
