  - {series_id: CUSR0000SEHA,   label: Rent of Primary Residence, basket: CPI, sa_nsa: SA, parent: CUSR0000SAH1, level: 3}
  - {series_id: CUSR0000SEHC,   label: Owners' Equivalent Rent,  basket: CPI, sa_nsa: SA, parent: CUSR0000SAH1, level: 3}
  - {series_id: CUSR0000SAH2,   label: Fuels and Utilities,      basket: CPI, sa_nsa: SA, parent: CUSR0000SAH, level: 2}
  - {series_id: CUSR0000SEHF01, label: Electricity,              basket: CPI, sa_nsa: SA, parent: CUSR0000SAH2, level: 3}
  - {series_id: CUSR0000SEHF02, label: Utility (Piped) Gas,      basket: CPI, sa_nsa: SA, parent: CUSR0000SAH2, level: 3}
  - {series_id: CUSR0000SETA01, label: New Vehicles,             basket: CPI, sa_nsa: SA, parent: CUSR0000SAT, level: 2}
  - {series_id: CUSR0000SETA02, label: Used Cars and Trucks,     basket: CPI, sa_nsa: SA, parent: CUSR0000SAT, level: 2}
  - {series_id: CUSR0000SETB01, label: Gasoline (All Types),     basket: CPI, sa_nsa: SA, parent: CUSR0000SAT, level: 2}
  - {series_id: CUSR0000SAM1,   label: Medical Care Commodities, basket: CPI, sa_nsa: SA, parent: CUSR0000SAM, level: 2}
  - {series_id: CUSR0000SAM2,   label: Medical Care Services,    basket: CPI, sa_nsa: SA, parent: CUSR0000SAM, level: 2}

  # ============================ CPI / NSA tree ===============================
  - {series_id: CUUR0000SA0,    label: All Items,                basket: CPI, sa_nsa: NSA, level: 0}
  - {series_id: CUUR0000SA0L1E, label: Core (All Items Less Food and Energy), basket: CPI, sa_nsa: NSA, parent: CUUR0000SA0, level: 1}
