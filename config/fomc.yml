# FOMC rate probabilities (gold.fomc_probability / gold.fomc_meeting_path,
# terminal module FOMC). See src/fred_pipeline/gold_config/fomc_config.py for
# field semantics, and docs/handoffs/terminal_phase0_gaps.md item 3 for the
# option-A design decision (no CME connector — derived from FRED short-rate/
# target series already ingested).
#
# meeting_dates: decision dates only (the *second* day of each 2-day FOMC
# meeting), verified live against
# https://www.federalreserve.gov/monetarypolicy/fomccalendars.htm (2026-07-17).
# Refresh this list as the Fed publishes further-out calendars.
meeting_dates:
  - "2026-07-29"
  - "2026-09-16"
  - "2026-10-28"
  - "2026-12-09"
  - "2027-01-27"
  - "2027-03-17"
  - "2027-04-28"
  - "2027-06-09"
  - "2027-07-28"
  - "2027-09-15"
  - "2027-10-27"
  - "2027-12-08"

bucket_step_bps: 25

# Anchor series for the current target range / effective rate (already
# ingested via manifests/fed_funding.yml).
target_low_series: DFEDTARL
target_high_series: DFEDTARU
effective_rate_series: EFFR

# Short end of the Treasury constant-maturity curve (already ingested via
# manifests/rates.yml), used to bootstrap the implied forward-rate path
# between meetings. tenor_months must be ascending.
tenors:
  - {series_id: DGS1MO, tenor_months: 1}
  - {series_id: DGS3MO, tenor_months: 3}
  - {series_id: DGS6MO, tenor_months: 6}
  - {series_id: DGS1,   tenor_months: 12}
